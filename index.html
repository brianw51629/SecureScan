<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureScan — AI Code Security Reviewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #0a0e14;
      color: #e0e6f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px 14px;
      border-bottom: 1px solid #1e2733;
      position: sticky;
      top: 0;
      background: #0a0e14;
      z-index: 10;
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: #00d4ff;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 20px; height: 20px; }
    .header-title { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; color: #fff; }
    .header-sub { font-size: 11px; color: #4a6080; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
    .badge {
      margin-left: auto;
      font-size: 10px; font-family: 'IBM Plex Mono', monospace;
      padding: 3px 9px;
      background: #0d2a1a; color: #00ff88;
      border: 1px solid #00ff8840; border-radius: 4px;
      letter-spacing: 0.05em;
    }

    /* ── Layout ── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 32px 60px;
    }

    /* ── API Key Section ── */
    .api-section {
      margin-bottom: 24px;
      padding: 16px 18px;
      background: #060a0f;
      border: 1px solid #1e2733;
      border-radius: 10px;
    }
    .api-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .api-label {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: #4a6080;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .api-input {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      background: #0d1520;
      color: #c9d8ec;
      border: 1px solid #1e2733;
      border-radius: 6px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .api-input:focus { border-color: #00d4ff40; }
    .api-input::placeholder { color: #2a3a50; }
    .api-toggle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #4a6080;
      background: transparent;
      border: 1px solid #1e2733;
      border-radius: 5px;
      padding: 7px 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .api-toggle:hover { color: #8099b8; border-color: #2a3a50; }
    .api-hint {
      margin-top: 8px;
      font-size: 11px;
      color: #2a3a50;
      font-family: 'IBM Plex Mono', monospace;
    }
    .api-hint a { color: #00d4ff; text-decoration: none; }
    .api-hint a:hover { text-decoration: underline; }
    .api-saved {
      font-size: 11px;
      color: #00ff88;
      font-family: 'IBM Plex Mono', monospace;
      display: none;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border: 1px solid #1e2733;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      width: fit-content;
    }
    .tab {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      padding: 7px 20px;
      background: transparent;
      color: #4a6080;
      border: none; cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .tab.active { background: #00d4ff18; color: #00d4ff; }
    .tab:hover:not(.active) { color: #8099b8; }

    /* ── Code Editor Panel ── */
    .code-wrap {
      border: 1px solid #1e2733;
      border-radius: 10px;
      overflow: hidden;
      background: #060a0f;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .code-wrap:focus-within { border-color: #00d4ff40; }
    .code-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px;
      background: #0d1520;
      border-bottom: 1px solid #1e2733;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .lang-select {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      background: #0a0e14; color: #4a6080;
      border: 1px solid #1e2733; border-radius: 4px;
      padding: 4px 10px; cursor: pointer;
    }
    .lang-select:focus { outline: none; border-color: #00d4ff40; color: #00d4ff; }
    #code-input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px; line-height: 1.75;
      width: 100%; min-height: 240px;
      background: transparent; color: #c9d8ec;
      border: none; padding: 16px 18px;
      resize: vertical; outline: none;
    }
    #code-input::placeholder { color: #2a3a50; }

    /* ── Upload Zone ── */
    .upload-zone {
      display: none;
      border: 1.5px dashed #1e2733;
      border-radius: 10px;
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #060a0f;
      margin-bottom: 14px;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: #00d4ff60; background: #00d4ff06; }
    .upload-zone.active { display: block; }
    .upload-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.35; }
    .upload-label { font-size: 14px; color: #4a6080; }
    .upload-label span { color: #00d4ff; cursor: pointer; }
    .upload-label span:hover { text-decoration: underline; }
    .file-types { font-size: 11px; color: #2a3a50; margin-top: 8px; font-family: 'IBM Plex Mono', monospace; }
    #file-input { display: none; }
    .file-loaded { font-size: 12px; color: #00ff88; margin-top: 10px; font-family: 'IBM Plex Mono', monospace; }

    /* ── Scan Button ── */
    .scan-row { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .scan-btn {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 11px 32px;
      background: #00d4ff; color: #060a0f;
      border: none; border-radius: 7px;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.15s;
    }
    .scan-btn:hover { background: #33ddff; transform: translateY(-1px); }
    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { background: #1e2733; color: #2a3a50; cursor: not-allowed; transform: none; }
    .scan-hint { font-size: 11px; color: #2a3a50; font-family: 'IBM Plex Mono', monospace; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(6,8,11,0.3);
      border-top-color: #060a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    .results { display: none; }
    .results-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid #1e2733;
    }
    .results-title { font-size: 15px; font-weight: 600; color: #fff; }
    .score-chips { display: flex; gap: 8px; margin-left: auto; }
    .chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: 4px;
      letter-spacing: 0.04em;
    }
    .chip-critical { background: #2a0a0a; color: #ff4444; border: 1px solid #ff444430; }
    .chip-high     { background: #2a1a00; color: #ff9900; border: 1px solid #ff990030; }
    .chip-medium   { background: #1a1a00; color: #ffee00; border: 1px solid #ffee0030; }
    .chip-low      { background: #0a1a10; color: #00ff88; border: 1px solid #00ff8830; }

    .summary-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: #0d1520; border: 1px solid #1e2733; border-radius: 8px;
      margin-bottom: 14px; font-size: 13px; color: #4a6080;
    }
    .summary-bar strong { color: #c9d8ec; font-weight: 500; }

    .vuln-list { display: flex; flex-direction: column; gap: 10px; }
    .vuln-card {
      border: 1px solid #1e2733; border-radius: 9px;
      overflow: hidden; background: #060a0f;
      animation: fadeIn 0.3s ease both;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .vuln-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px; cursor: pointer; user-select: none;
      transition: background 0.12s;
    }
    .vuln-card-header:hover { background: #0d1520; }

    .sev-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; font-weight: 600;
      padding: 2px 8px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .sev-CRITICAL { background: #2a0a0a; color: #ff4444; border: 1px solid #ff444430; }
    .sev-HIGH     { background: #2a1a00; color: #ff9900; border: 1px solid #ff990030; }
    .sev-MEDIUM   { background: #1a1a00; color: #ffee00; border: 1px solid #ffee0030; }
    .sev-LOW      { background: #0a1a10; color: #00ff88; border: 1px solid #00ff8830; }

    .vuln-name { font-size: 13px; font-weight: 500; color: #c9d8ec; flex: 1; }
    .vuln-type { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #2a3a50; }
    .chevron { font-size: 11px; color: #2a3a50; transition: transform 0.2s; }
    .vuln-card.open .chevron { transform: rotate(90deg); }

    .vuln-body { display: none; padding: 0 16px 16px; border-top: 1px solid #1e2733; }
    .vuln-card.open .vuln-body { display: block; }

    .vuln-section { margin-top: 14px; }
    .vuln-section-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; color: #2a3a50;
      margin-bottom: 7px; font-family: 'IBM Plex Mono', monospace;
    }
    .vuln-desc { font-size: 13px; color: #8099b8; line-height: 1.75; }
    .vuln-fix {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.7;
      color: #00ff88; background: #0d2a1a;
      border: 1px solid #00ff8818; border-radius: 7px;
      padding: 12px 14px; white-space: pre-wrap; word-break: break-word;
    }
    .vuln-line {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      color: #4a6080; background: #0d1520;
      border-radius: 4px; padding: 4px 10px; display: inline-block;
    }

    .clean-banner {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px;
      background: #0d2a1a; border: 1px solid #00ff8830; border-radius: 9px;
      font-size: 14px; color: #00ff88;
    }
    .error-banner {
      padding: 14px 18px;
      background: #2a0a0a; border: 1px solid #ff444430; border-radius: 9px;
      font-size: 12px; color: #ff4444;
      font-family: 'IBM Plex Mono', monospace; line-height: 1.6;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 2L14 5V9C14 12 11.5 14.5 9 16C6.5 14.5 4 12 4 9V5L9 2Z" stroke="#060a0f" stroke-width="1.5" fill="none"/>
        <path d="M7 9L8.5 10.5L11 7.5" stroke="#060a0f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="header-title">SecureScan</div>
      <div class="header-sub">AI Code Security Reviewer</div>
    </div>
    <div class="badge">v0.1 MVP</div>
  </header>

  <main class="main">

    <!-- API Key -->
    <div class="api-section">
      <div class="api-row">
        <div class="api-label">Groq API Key</div>
        <input
          class="api-input"
          type="password"
          id="api-key"
          placeholder="gsk_..."
          oninput="onKeyInput()"
        />
        <button class="api-toggle" onclick="toggleKeyVisibility()">show</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <div class="api-hint">Get a free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> — no credit card needed</div>
        <div class="api-saved" id="api-saved">✓ key saved</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-paste" onclick="switchTab('paste')">Paste code</button>
      <button class="tab" id="tab-upload" onclick="switchTab('upload')">Upload file</button>
    </div>

    <!-- Paste Panel -->
    <div class="code-wrap" id="paste-panel">
      <div class="code-header">
        <div class="dot" style="background:#ff5f56"></div>
        <div class="dot" style="background:#ffbd2e"></div>
        <div class="dot" style="background:#27c93f"></div>
        <select class="lang-select" id="lang-select">
          <option value="auto">auto-detect</option>
          <option value="python">python</option>
          <option value="javascript">javascript</option>
          <option value="java">java</option>
          <option value="c">c / c++</option>
          <option value="sql">sql</option>
          <option value="bash">bash / shell</option>
          <option value="go">go</option>
          <option value="php">php</option>
          <option value="ruby">ruby</option>
        </select>
      </div>
      <textarea id="code-input" placeholder="// Paste your code here and click Scan...&#10;// SecureScan checks for SQL injection, XSS, exposed secrets, insecure configs, and more."></textarea>
    </div>

    <!-- Upload Panel -->
    <div class="upload-zone" id="upload-panel"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <div class="upload-icon">📁</div>
      <div class="upload-label">Drop a file here or <span onclick="document.getElementById('file-input').click()">browse</span></div>
      <div class="file-types">.py · .js · .ts · .java · .c · .cpp · .go · .php · .rb · .sh · .sql</div>
      <div class="file-loaded" id="file-loaded"></div>
      <input type="file" id="file-input" accept=".py,.js,.ts,.java,.c,.cpp,.go,.php,.rb,.sh,.sql,.txt" onchange="handleFile(this)" />
    </div>

    <!-- Scan -->
    <div class="scan-row">
      <button class="scan-btn" id="scan-btn" onclick="runScan()">
        <span class="spinner" id="spinner"></span>
        <span id="scan-label">Scan code</span>
      </button>
      <div class="scan-hint">Powered by Groq · llama-3.3-70b-versatile</div>
    </div>

    <!-- Results -->
    <div class="results" id="results"></div>

  </main>

  <script>
    let currentTab = 'paste';
    let uploadedCode = '';

    // ── Key saved indicator ──
    function onKeyInput() {
      const saved = document.getElementById('api-saved');
      saved.style.display = document.getElementById('api-key').value ? 'block' : 'none';
    }

    function toggleKeyVisibility() {
      const input = document.getElementById('api-key');
      const btn = event.target;
      if (input.type === 'password') { input.type = 'text'; btn.textContent = 'hide'; }
      else { input.type = 'password'; btn.textContent = 'show'; }
    }

    // ── Tabs ──
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-paste').classList.toggle('active', tab === 'paste');
      document.getElementById('tab-upload').classList.toggle('active', tab === 'upload');
      document.getElementById('paste-panel').style.display = tab === 'paste' ? 'block' : 'none';
      const uploadEl = document.getElementById('upload-panel');
      uploadEl.style.display = tab === 'upload' ? 'block' : 'none';
      uploadEl.classList.toggle('active', tab === 'upload');
    }
    switchTab('paste');

    // ── File handling ──
    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        uploadedCode = e.target.result;
        document.getElementById('file-loaded').textContent = '✓ ' + file.name + ' loaded';
      };
      reader.readAsText(file);
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('upload-panel').classList.remove('drag');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        uploadedCode = ev.target.result;
        document.getElementById('file-loaded').textContent = '✓ ' + file.name + ' loaded';
      };
      reader.readAsText(file);
    }

    function getCode() {
      return currentTab === 'paste'
        ? document.getElementById('code-input').value.trim()
        : uploadedCode.trim();
    }

    function getLang() {
      const v = document.getElementById('lang-select').value;
      return v === 'auto' ? '' : v;
    }

    // ── Scan ──
    async function runScan() {
      const apiKey = document.getElementById('api-key').value.trim();
      if (!apiKey) { showError('Enter your Groq API key above before scanning.'); return; }

      const code = getCode();
      if (!code) { showError('No code to scan. Paste some code or upload a file first.'); return; }
      if (code.length > 30000) { showError('Code too large (max ~30,000 chars). Try a smaller snippet.'); return; }

      const btn = document.getElementById('scan-btn');
      const spinner = document.getElementById('spinner');
      const label = document.getElementById('scan-label');
      btn.disabled = true; spinner.style.display = 'block'; label.textContent = 'Scanning...';
      document.getElementById('results').style.display = 'none';

      const langHint = getLang() ? `The language is ${getLang()}.` : 'Auto-detect the language.';

      const systemPrompt = `You are a professional security code reviewer. Analyze code for security vulnerabilities.
Always respond with ONLY a valid JSON object — no markdown, no explanation, no code fences.
Use this exact structure:
{
  "language": "detected language",
  "summary": "one sentence overall assessment",
  "vulnerabilities": [
    {
      "id": "VULN-001",
      "name": "short vulnerability name",
      "severity": "CRITICAL|HIGH|MEDIUM|LOW",
      "type": "e.g. SQL Injection, XSS, Hardcoded Secret",
      "description": "clear explanation of the vulnerability and why it is dangerous",
      "location": "line number or function name, or General",
      "fix": "concrete code fix or remediation advice"
    }
  ]
}
Severity guide: CRITICAL=immediate exploitation risk, HIGH=serious risk, MEDIUM=moderate risk, LOW=best practice or minor issue.
Return an empty array for vulnerabilities if the code is clean.`;

      const userPrompt = `${langHint}\n\nCode to review:\n${code}`;

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            temperature: 0.1,
            max_tokens: 1500,
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ]
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(`Groq API error ${res.status}: ${err?.error?.message || res.statusText}`);
        }

        const data = await res.json();
        const rawText = data.choices[0].message.content || '';
        const clean = rawText.replace(/```json|```/g, '').trim();
        const result = JSON.parse(clean);
        renderResults(result);
      } catch (err) {
        showError(`Scan failed: ${err.message}`);
      } finally {
        btn.disabled = false; spinner.style.display = 'none'; label.textContent = 'Scan code';
      }
    }

    // ── Render ──
    function renderResults(result) {
      const el = document.getElementById('results');
      el.style.display = 'block';

      if (!result.vulnerabilities || result.vulnerabilities.length === 0) {
        el.innerHTML = `
          <div class="results-header">
            <div class="results-title">Scan complete — ${result.language || 'code'}</div>
          </div>
          <div class="clean-banner">
            <span style="font-size:22px">✓</span>
            <div>
              <div style="font-weight:600;margin-bottom:3px">No vulnerabilities detected</div>
              <div style="font-size:12px;color:#00aa55;opacity:0.85">${result.summary || 'Code looks clean.'}</div>
            </div>
          </div>`;
        return;
      }

      const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
      result.vulnerabilities.forEach(v => { if (counts[v.severity] !== undefined) counts[v.severity]++; });

      const chips = Object.entries(counts)
        .filter(([, n]) => n > 0)
        .map(([sev, n]) => `<div class="chip chip-${sev.toLowerCase()}">${n} ${sev}</div>`)
        .join('');

      const cards = result.vulnerabilities.map((v, i) => `
        <div class="vuln-card" id="vc-${i}">
          <div class="vuln-card-header" onclick="toggleCard(${i})">
            <div class="sev-badge sev-${v.severity}">${v.severity}</div>
            <div class="vuln-name">${v.name}</div>
            <div class="vuln-type">${v.type}</div>
            <div class="chevron">▶</div>
          </div>
          <div class="vuln-body">
            <div class="vuln-section">
              <div class="vuln-section-label">Location</div>
              <div class="vuln-line">${v.location}</div>
            </div>
            <div class="vuln-section">
              <div class="vuln-section-label">Description</div>
              <div class="vuln-desc">${v.description}</div>
            </div>
            <div class="vuln-section">
              <div class="vuln-section-label">How to fix</div>
              <div class="vuln-fix">${escHtml(v.fix)}</div>
            </div>
          </div>
        </div>`).join('');

      el.innerHTML = `
        <div class="results-header">
          <div class="results-title">Scan results — ${result.language || 'code'}</div>
          <div class="score-chips">${chips}</div>
        </div>
        <div class="summary-bar">
          <strong>${result.vulnerabilities.length} issue${result.vulnerabilities.length !== 1 ? 's' : ''} found</strong>
          <span>·</span>
          <span>${result.summary}</span>
        </div>
        <div class="vuln-list">${cards}</div>`;

      toggleCard(0);
    }

    function toggleCard(i) {
      const card = document.getElementById('vc-' + i);
      if (card) card.classList.toggle('open');
    }

    function showError(msg) {
      const el = document.getElementById('results');
      el.style.display = 'block';
      el.innerHTML = `<div class="error-banner">⚠ ${msg}</div>`;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>

</body>
</html>
